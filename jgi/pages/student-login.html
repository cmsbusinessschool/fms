<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>Student Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(
135deg,
#0f172a,
#1e293b,
#2563eb
);
}

.login-container{

width:420px;

background:white;

padding:40px;

border-radius:20px;

box-shadow:0 20px 40px rgba(0,0,0,.25);

}

.logo{

text-align:center;

margin-bottom:20px;

}

.logo img{

width:100px;

}

h2{

text-align:center;

margin-bottom:25px;

color:#0f172a;

}

.input-group{

margin-bottom:15px;

}

input{

width:100%;

padding:12px;

border:1px solid #d1d5db;

border-radius:10px;

font-size:15px;

}

input:focus{

outline:none;

border-color:#2563eb;

}

button{

width:100%;

padding:12px;

background:#2563eb;

color:white;

border:none;

border-radius:10px;

font-size:16px;

font-weight:600;

cursor:pointer;

transition:.3s;

}

button:hover{

background:#1d4ed8;

}

.error{

margin-top:15px;

text-align:center;

color:red;

font-size:14px;

}

.success{

margin-top:15px;

text-align:center;

color:green;

font-size:14px;

}

.back{

text-align:center;

margin-top:15px;

}

.back a{

text-decoration:none;

color:#2563eb;

}

</style>

</head>

<body>

<div class="login-container">

<div class="logo">

<img src="../assets/logo.png"
     alt="CMS Logo">

</div>

<h2>Student Login</h2>

<div class="input-group">

<input type="email"
       id="email"
       placeholder="Enter Email ID">

</div>

<div class="input-group">

<input type="password"
       id="password"
       placeholder="Enter Password">

</div>

<button onclick="loginStudent()">
Login
</button>

<div id="message"></div>

<div class="back">

<a href="../index.html">
Back to Home
</a>

</div>

</div>

<script>

async function loginStudent(){

try{

const email =
document.getElementById("email")
.value
.trim()
.toLowerCase();

const password =
document.getElementById("password")
.value
.trim();

const response =
await fetch("../data/students.json");

if(!response.ok){

throw new Error(
"students.json not found"
);

}

const students =
await response.json();

const user =
students.find(student =>

student.email.toLowerCase()
=== email &&

student.password
=== password

);

if(user){

localStorage.setItem(
"studentEmail",
email
);

document.getElementById(
"message"
).innerHTML =
'<div class="success">Login Successful...</div>';

setTimeout(()=>{

window.location.href =
"../dashboard/student.html";

},1000);

}
else{

document.getElementById(
"message"
).innerHTML =
'<div class="error">Invalid Email or Password</div>';

}

}
catch(error){

document.getElementById(
"message"
).innerHTML =
'<div class="error">Unable to load students.json</div>';

console.log(error);

}

}

</script>

</body>
</html>
